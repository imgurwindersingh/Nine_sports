<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nine Sports Admin Panel</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Admin Panel</p>
        <h1>Create collections for your mobile app users</h1>
        <p class="intro">
          Add a collection title, choose many photos, and create an album-style collection that shows on the device.
        </p>
      </section>

      <section class="card">
        <form id="upload-form" class="form">
          <label>
            <span>Collection title</span>
            <input id="collection-title" name="collectionTitle" type="text" placeholder="Example: Wedding album" required />
          </label>

          <label>
            <span>Photo title prefix (optional)</span>
            <input id="title-prefix" name="titlePrefix" type="text" placeholder="Example: Wedding photo" />
          </label>

          <label>
            <span>Select images</span>
            <input id="image" name="images" type="file" accept="image/*" multiple required />
          </label>

          <p id="selection-count" class="selection-count">No images selected.</p>

          <button type="submit">Create Collection</button>
        </form>

        <p id="status" class="status"></p>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>Collections</h2>
          <button id="refresh-button" class="secondary-button" type="button">Refresh</button>
        </div>
        <div id="collection-list" class="collection-list"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
